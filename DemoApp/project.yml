name: InspectlyDemo
options:
  bundleIdPrefix: com.inspectly

targets:
  Inspectly:
    type: framework
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ../Inspectly/
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Inspectly
        INFOPLIST_KEY_NSHumanReadableCopyright: ""

  DemoApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
    dependencies:
      - target: Inspectly
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

schemes:
  DemoApp:
    build:
      targets:
        DemoApp: all