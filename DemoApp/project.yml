name: InspectlyDemo
options:
  bundleIdPrefix: com.inspectly

packages:
  Inspectly:
    path: ../

targets:
  DemoApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
    dependencies:
      - package: Inspectly
        product: Inspectly
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

schemes:
  DemoApp:
    build:
      targets:
        DemoApp: all