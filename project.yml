name: Inspectly
options:
  bundleIdPrefix: com.inspectly
targets:
  Inspectly:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Inspectly/
    info:
      path: Inspectly/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
