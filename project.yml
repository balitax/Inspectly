name: Inspectly
options:
  bundleIdPrefix: com.inspectly

targets:
  DemoApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DemoApp/
      - path: Inspectly/
    info:
      path: DemoApp/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

schemes:
  DemoApp:
    build:
      targets:
        DemoApp: all