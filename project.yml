name: Inspectly
options:
  bundleIdPrefix: com.inspectly

targets:
  Inspectly:
    type: framework
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/Inspectly/

  DemoApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DemoApp/
    dependencies:
      - target: Inspectly
    info:
      path: DemoApp/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

schemes:
  DemoApp:
    build:
      targets:
        DemoApp: all